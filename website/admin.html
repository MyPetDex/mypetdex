<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyPetDex Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { background: #F1F5F9; min-height: 100vh; }

  /* Login */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #fff; border-radius: 20px; padding: 40px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
  .login-logo { font-size: 48px; margin-bottom: 8px; }
  .login-box h1 { font-size: 24px; font-weight: 900; color: #1E293B; margin-bottom: 4px; }
  .login-box p { color: #64748B; font-size: 14px; margin-bottom: 28px; }
  .login-box input { width: 100%; border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 13px 14px; font-size: 15px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: #4CAF82; }
  .login-box button { width: 100%; background: #4CAF82; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .login-box button:hover { background: #3a9e6f; }
  .login-error { color: #EF4444; font-size: 13px; margin-bottom: 10px; }

  /* Dashboard */
  #dashboard { display: none; max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .top-bar h1 { font-size: 28px; font-weight: 900; color: #1E293B; }
  .top-bar p { color: #64748B; font-size: 14px; margin-top: 4px; }
  .btn-refresh { background: #4CAF82; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-refresh:hover { background: #3a9e6f; }

  /* Revenue card */
  .revenue-card { background: #1E293B; border-radius: 18px; padding: 28px; text-align: center; margin-bottom: 28px; }
  .revenue-label { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .revenue-num { color: #fff; font-size: 52px; font-weight: 900; margin: 8px 0; }
  .revenue-sub { color: rgba(255,255,255,0.35); font-size: 13px; }

  /* Stats grid */
  .section-title { font-size: 16px; font-weight: 700; color: #1E293B; margin: 24px 0 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .stat-card { background: #fff; border-radius: 14px; padding: 16px; border-left: 4px solid #4CAF82; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .stat-num { font-size: 30px; font-weight: 900; color: #1E293B; }
  .stat-label { font-size: 12px; color: #64748B; margin-top: 4px; }

  /* Cards */
  .card { background: #fff; border-radius: 14px; padding: 18px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .card-name { font-size: 16px; font-weight: 700; color: #1E293B; }
  .card-meta { font-size: 13px; color: #64748B; margin-top: 4px; line-height: 1.6; }
  .actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 4px; }
  .btn-approve { background: #DCFCE7; color: #166534; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-approve:hover { background: #4CAF82; color: #fff; }
  .btn-reject { background: #FEE2E2; color: #991B1B; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-reject:hover { background: #EF4444; color: #fff; }
  .empty { text-align: center; padding: 28px; color: #94A3B8; font-size: 15px; background: #fff; border-radius: 14px; }
  .stars { color: #F5C842; font-size: 15px; margin-top: 4px; }
  .review-text { color: #64748B; font-size: 14px; margin-top: 8px; line-height: 1.6; }

  /* Toast */
  #toast { position: fixed; top: 20px; right: 20px; background: #1E293B; color: #fff; border-radius: 12px; padding: 13px 22px; font-weight: 700; font-size: 14px; display: none; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

  /* Loader */
  .loader { text-align: center; padding: 60px; color: #94A3B8; font-size: 16px; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🐾</div>
    <h1>MyPetDex Admin</h1>
    <p>Enter your credentials to continue</p>
    <div class="login-error" id="pw-error" style="display:none"></div>
    <input type="password" id="pw-input" placeholder="Dashboard Password" onkeydown="if(event.key==='Enter') checkPassword()" />
    <input type="password" id="fb-input" placeholder="Firebase Account Password (mypetdexapp@gmail.com)" onkeydown="if(event.key==='Enter') checkPassword()" />
    <button onclick="checkPassword()">Enter Dashboard</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div id="toast"></div>

  <div class="top-bar">
    <div>
      <h1>🐾 MyPetDex Admin</h1>
      <p id="status-line">Loading...</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-refresh" onclick="loadAll()">↻ Refresh</button>
      <button class="btn-refresh" style="background:#EF4444" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>

  <div id="content"><div class="loader">Loading data...</div></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const ADMIN_PASSWORD = "MPD@admin2026";

const firebaseConfig = {
  apiKey: "AIzaSyDaN37qj7QBWN3Ro98KOrhPk5i8rKVnWx8",
  authDomain: "app.mypetdex.app",
  projectId: "mypetdex-c4315",
  storageBucket: "mypetdex-c4315.firebasestorage.app",
  messagingSenderId: "209772699227",
  appId: "1:209772699227:web:68d547574d8d068f6da97e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ── Password check ────────────────────────────────────────────────────────────
window.checkPassword = async function() {
  const val = document.getElementById("pw-input").value;
  const fbPw = document.getElementById("fb-input").value;
  const err = document.getElementById("pw-error");

  if (val !== ADMIN_PASSWORD) {
    err.textContent = "Wrong dashboard password. Try again.";
    err.style.display = "block";
    document.getElementById("pw-input").value = "";
    return;
  }
  if (!fbPw) {
    err.textContent = "Please enter your Firebase account password.";
    err.style.display = "block";
    return;
  }

  err.style.display = "none";
  const btn = document.querySelector(".login-box button");
  btn.textContent = "Signing in...";
  btn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, "mypetdexapp@gmail.com", fbPw);
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadAll();
  } catch(e) {
    err.textContent = "Firebase login failed: " + e.message;
    err.style.display = "block";
    btn.textContent = "Enter Dashboard";
    btn.disabled = false;
    document.getElementById("fb-input").value = "";
  }
};

// ── Sign out ──────────────────────────────────────────────────────────────────
window.doSignOut = async function() {
  try { await auth.signOut(); } catch {}
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("pw-input").value = "";
  document.getElementById("fb-input").value = "";
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 3000);
}

// ── Load all data ─────────────────────────────────────────────────────────────
window.loadAll = async function() {
  document.getElementById("content").innerHTML = '<div class="loader">Loading data...</div>';
  document.getElementById("status-line").textContent = "Loading...";

  try {
    // Users
    const usersSnap = await getDocs(collection(db, "users"));
    let owners = 0, providers = 0, shelters = 0, plusUsers = 0, familyUsers = 0;
    const pendingProviders = [], pendingShelters = [];

    usersSnap.forEach(d => {
      const data = { id: d.id, ...d.data() };
      if (data.role === "owner") owners++;
      else if (data.role === "provider") {
        providers++;
        if (!data.approved && !data.rejected) pendingProviders.push(data);
      } else if (data.role === "shelter") {
        shelters++;
        if (!data.approved && !data.rejected) pendingShelters.push(data);
      }
      if (data.plan === "plus") plusUsers++;
      if (data.plan === "family") familyUsers++;
    });

    // Reviews
    const revSnap = await getDocs(query(collection(db, "reviews"), where("published", "==", false)));
    const pendingReviews = revSnap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(r => !r.rejected);

    const totalUsers = owners + providers + shelters;
    const revenue = (plusUsers * 3.0 + familyUsers * 5.0).toFixed(2);
    const freeUsers = owners - plusUsers - familyUsers;
    const pendingCount = pendingProviders.length + pendingShelters.length + pendingReviews.length;

    document.getElementById("status-line").textContent =
      `${totalUsers} total users · ${pendingCount > 0 ? `⚠️ ${pendingCount} pending action${pendingCount > 1 ? "s" : ""}` : "✅ All clear"}`;

    // ── Render ────────────────────────────────────────────────────────────────
    document.getElementById("content").innerHTML = `

      <div class="revenue-card">
        <div class="revenue-label">Est. Monthly Revenue</div>
        <div class="revenue-num">$${revenue}</div>
        <div class="revenue-sub">${plusUsers} Plus × $3.00 &nbsp;+&nbsp; ${familyUsers} Family × $5.00</div>
      </div>

      <div class="section-title">Users (${totalUsers} total)</div>
      <div class="stats-grid">
        ${statCard(owners, "Pet Owners", "#4CAF82")}
        ${statCard(providers, "Providers", "#3B82F6")}
        ${statCard(shelters, "Shelters", "#F5A623")}
        ${statCard(plusUsers, "Plus Plans", "#8B5CF6")}
        ${statCard(familyUsers, "Family Plans", "#EC4899")}
        ${statCard(freeUsers < 0 ? 0 : freeUsers, "Free Plans", "#64748B")}
      </div>

      <div class="section-title">⏳ Pending Provider Approvals (${pendingProviders.length})</div>
      ${pendingProviders.length === 0
        ? '<div class="empty">✅ No pending providers</div>'
        : pendingProviders.map(p => `
          <div class="card">
            <div class="card-row">
              <div>
                <div class="card-name">${p.businessName || p.displayName || "Unknown"}</div>
                <div class="card-meta">
                  📧 ${p.email || "—"}<br>
                  🛎️ ${p.service || p.serviceType || "—"} &nbsp;·&nbsp; 📍 ${p.city || ""}${p.state ? ", " + p.state : ""}<br>
                  ${p.phone ? "📞 " + p.phone + "<br>" : ""}
                  ${p.priceRange ? "💰 " + p.priceRange : ""}
                </div>
              </div>
              <div class="actions">
                <button class="btn-approve" onclick="approveUser('${p.id}', 'provider')">✓ Approve</button>
                <button class="btn-reject" onclick="rejectUser('${p.id}', 'provider')">✕ Reject</button>
              </div>
            </div>
          </div>`).join("")
      }

      <div class="section-title">⏳ Pending Shelter Approvals (${pendingShelters.length})</div>
      ${pendingShelters.length === 0
        ? '<div class="empty">✅ No pending shelters</div>'
        : pendingShelters.map(s => `
          <div class="card">
            <div class="card-row">
              <div>
                <div class="card-name">${s.shelterName || s.displayName || "Unknown"}</div>
                <div class="card-meta">
                  📧 ${s.email || "—"}<br>
                  📍 ${s.city || ""}${s.state ? ", " + s.state : ""}<br>
                  ${s.ein ? "EIN: " + s.ein + "<br>" : ""}
                  ${s.license ? "License: " + s.license : ""}
                </div>
              </div>
              <div class="actions">
                <button class="btn-approve" onclick="approveUser('${s.id}', 'shelter')">✓ Approve</button>
                <button class="btn-reject" onclick="rejectUser('${s.id}', 'shelter')">✕ Reject</button>
              </div>
            </div>
          </div>`).join("")
      }

      <div class="section-title">⭐ Pending Review Approvals (${pendingReviews.length})</div>
      ${pendingReviews.length === 0
        ? '<div class="empty">✅ No pending reviews</div>'
        : pendingReviews.map(r => `
          <div class="card">
            <div class="card-row">
              <div style="flex:1">
                <div class="card-name">${r.clientName || "Pet Owner"}</div>
                <div class="card-meta">For: ${r.providerName || r.providerId || "—"}</div>
                <div class="stars">${"★".repeat(r.rating || 0)}${"☆".repeat(5 - (r.rating || 0))} &nbsp; ${r.rating || 0}/5</div>
                <div class="review-text">${r.text || r.comment || "(no text)"}</div>
              </div>
              <div class="actions" style="align-self:flex-start">
                <button class="btn-approve" onclick="approveReview('${r.id}')">✓ Publish</button>
                <button class="btn-reject" onclick="rejectReview('${r.id}')">✕ Reject</button>
              </div>
            </div>
          </div>`).join("")
      }
    `;

  } catch (err) {
    document.getElementById("content").innerHTML = `<div class="empty">❌ Error loading data: ${err.message}</div>`;
  }
};

function statCard(num, label, color) {
  return `<div class="stat-card" style="border-left-color:${color}">
    <div class="stat-num">${num}</div>
    <div class="stat-label">${label}</div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
window.approveUser = async function(uid, type) {
  try {
    await updateDoc(doc(db, "users", uid), { approved: true });
    showToast(`✅ ${type === "provider" ? "Provider" : "Shelter"} approved!`);
    loadAll();
  } catch(e) { showToast("❌ Error: " + e.message); }
};

window.rejectUser = async function(uid, type) {
  try {
    await updateDoc(doc(db, "users", uid), { approved: false, rejected: true });
    showToast(`❌ ${type === "provider" ? "Provider" : "Shelter"} rejected.`);
    loadAll();
  } catch(e) { showToast("❌ Error: " + e.message); }
};

window.approveReview = async function(id) {
  try {
    await updateDoc(doc(db, "reviews", id), { published: true });
    showToast("✅ Review published!");
    loadAll();
  } catch(e) { showToast("❌ Error: " + e.message); }
};

window.rejectReview = async function(id) {
  try {
    await updateDoc(doc(db, "reviews", id), { published: false, rejected: true });
    showToast("❌ Review rejected.");
    loadAll();
  } catch(e) { showToast("❌ Error: " + e.message); }
};
</script>
</body>
</html>
