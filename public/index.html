<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
    <style>
      html {
        background-color: #F5F8FF;
      }
      html, body {
        margin: 0;
        overflow-x: hidden;
        max-width: 100vw;
        background-color: #F5F8FF;
        min-height: 100%;
      }
      #root {
        min-height: 100vh;
        background-color: #F5F8FF;
      }
      #app-splash {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F5F8FF;
        font-family: 'Nunito', sans-serif;
      }
      #app-splash img {
        width: 90px;
        height: 90px;
        border-radius: 24px;
        margin-bottom: 24px;
        box-shadow: 0 4px 24px rgba(59, 130, 246, 0.2);
      }
      #app-splash h1 {
        margin: 0 0 8px;
        font-weight: 900;
        font-size: 28px;
        color: #1E293B;
        letter-spacing: -0.5px;
      }
      #app-splash p {
        margin: 0 0 32px;
        color: #64748B;
        font-size: 15px;
      }
      #app-splash .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E2E8F0;
        border-top-color: #3B82F6;
        border-radius: 50%;
        animation: mpd-spin 0.8s linear infinite;
      }
      @keyframes mpd-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <meta name="theme-color" content="#F5F8FF" />
    <title>MyPetDex — Your Complete Pet Care Companion</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="MyPetDex — Your Complete Pet Care Companion" />
    <meta name="description" content="Manage your pets' health, appointments, reminders, and records all in one place." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mypetdex.app/" />
    <meta property="og:title" content="MyPetDex — Your Complete Pet Care Companion" />
    <meta property="og:description" content="Manage your pets' health, appointments, reminders, and records all in one place." />
    <meta property="og:image" content="https://mypetdex.app/preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mypetdex.app/" />
    <meta name="twitter:title" content="MyPetDex — Your Complete Pet Care Companion" />
    <meta name="twitter:description" content="Manage your pets' health, appointments, reminders, and records all in one place." />
    <meta name="twitter:image" content="https://mypetdex.app/preview.png" />
    <meta name="impact-site-verification" content="6b8439b8-8336-414e-aeee-4321fd19afe9">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="app-splash" aria-live="polite" aria-busy="true">
        <img src="%PUBLIC_URL%/logo.png" alt="MyPetDex" width="90" height="90" />
        <h1>MyPetDex</h1>
        <p id="app-splash-msg">Loading…</p>
        <div class="spinner" role="status" aria-label="Loading"></div>
      </div>
    </div>
    <script>
      (function () {
        var pending = sessionStorage.getItem("oauthRedirectPending");
        if (!pending) return;
        var msg = document.getElementById("app-splash-msg");
        if (msg) {
          msg.textContent = pending === "apple"
            ? "Signing in with Apple…"
            : "Signing in with Google…";
        }
      })();
    </script>
  </body>
</html>
