<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4486F4" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      :root {
        --mpd-blue: #4486F4;
        --mpd-blue-dark: #2F6AD8;
        --mpd-bg: #F0F5FF;
      }
      html {
        background: var(--mpd-bg);
      }
      html, body {
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
        max-width: 100vw;
        background: var(--mpd-bg);
      }
      #root {
        min-height: 100vh;
        background: var(--mpd-bg);
      }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(165deg, #4486F4 0%, #5B9CF8 38%, #F0F5FF 72%, #F0F5FF 100%);
        overflow: hidden;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      #app-splash.mpd-splash-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash .mpd-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.5;
        animation: mpd-float 8s ease-in-out infinite;
      }
      #app-splash .mpd-orb-a {
        width: 220px; height: 220px;
        background: #fff;
        top: -40px; right: -60px;
      }
      #app-splash .mpd-orb-b {
        width: 180px; height: 180px;
        background: #2F6AD8;
        bottom: 20%; left: -50px;
        animation-delay: -3s;
      }
      #app-splash .mpd-paws {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.12;
        font-size: 28px;
        line-height: 1;
      }
      #app-splash .mpd-paws span {
        position: absolute;
        animation: mpd-paw-drift 12s ease-in-out infinite;
      }
      #app-splash .mpd-card {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 0 28px;
        animation: mpd-rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #app-splash .mpd-logo-wrap {
        width: 108px;
        height: 108px;
        margin: 0 auto 22px;
        border-radius: 28px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 16px 48px rgba(47, 106, 216, 0.35), 0 0 0 1px rgba(255,255,255,0.8);
        animation: mpd-pulse 2.4s ease-in-out infinite;
      }
      #app-splash .mpd-logo-wrap img {
        width: 76px;
        height: 76px;
        border-radius: 18px;
        object-fit: contain;
      }
      #app-splash h1 {
        margin: 0 0 6px;
        font-weight: 900;
        font-size: 32px;
        color: #fff;
        letter-spacing: -0.8px;
        text-shadow: 0 2px 16px rgba(47, 106, 216, 0.35);
      }
      #app-splash .mpd-tagline {
        margin: 0 0 28px;
        font-size: 15px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.92);
      }
      #app-splash #app-splash-msg {
        margin: 0 0 20px;
        font-size: 14px;
        font-weight: 700;
        color: var(--mpd-text, #1E293B);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 10px 20px;
        border-radius: 999px;
        box-shadow: 0 4px 20px rgba(68, 134, 244, 0.15);
      }
      #app-splash .mpd-dots {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      #app-splash .mpd-dots i {
        display: block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--mpd-blue);
        animation: mpd-dot 1.2s ease-in-out infinite;
      }
      #app-splash .mpd-dots i:nth-child(2) { animation-delay: 0.15s; }
      #app-splash .mpd-dots i:nth-child(3) { animation-delay: 0.3s; }
      @keyframes mpd-float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-18px) scale(1.05); }
      }
      @keyframes mpd-paw-drift {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.12; }
        50% { transform: translateY(-12px) rotate(8deg); opacity: 0.2; }
      }
      @keyframes mpd-rise {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes mpd-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 16px 48px rgba(47, 106, 216, 0.35); }
        50% { transform: scale(1.03); box-shadow: 0 20px 56px rgba(47, 106, 216, 0.45); }
      }
      @keyframes mpd-dot {
        0%, 80%, 100% { transform: scale(0.65); opacity: 0.45; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
    <title>MyPetDex — Your Complete Pet Care Companion</title>
    <meta name="title" content="MyPetDex — Your Complete Pet Care Companion" />
    <meta name="description" content="Manage your pets' health, appointments, reminders, and records all in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mypetdex.app/" />
    <meta property="og:title" content="MyPetDex — Your Complete Pet Care Companion" />
    <meta property="og:description" content="Manage your pets' health, appointments, reminders, and records all in one place." />
    <meta property="og:image" content="https://mypetdex.app/preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mypetdex.app/" />
    <meta name="twitter:title" content="MyPetDex — Your Complete Pet Care Companion" />
    <meta name="twitter:description" content="Manage your pets' health, appointments, reminders, and records all in one place." />
    <meta name="twitter:image" content="https://mypetdex.app/preview.png" />
    <meta name="impact-site-verification" content="6b8439b8-8336-414e-aeee-4321fd19afe9">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Splash lives OUTSIDE #root so React cannot wipe it on mount -->
    <div id="app-splash" aria-live="polite" aria-busy="true">
      <div class="mpd-orb mpd-orb-a"></div>
      <div class="mpd-orb mpd-orb-b"></div>
      <div class="mpd-paws" aria-hidden="true">
        <span style="top:12%;left:8%">🐾</span>
        <span style="top:22%;right:12%;animation-delay:-2s">🐾</span>
        <span style="bottom:28%;left:14%;animation-delay:-5s">🐾</span>
        <span style="bottom:18%;right:10%;animation-delay:-7s">🐾</span>
      </div>
      <div class="mpd-card">
        <div class="mpd-logo-wrap">
          <img src="%PUBLIC_URL%/logo.png" alt="" width="76" height="76" />
        </div>
        <h1>MyPetDex</h1>
        <p class="mpd-tagline">Your pet's world, organized</p>
        <p id="app-splash-msg">Loading your companion…</p>
        <div class="mpd-dots" role="status" aria-label="Loading">
          <i></i><i></i><i></i>
        </div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
